# Render Blueprint for the BrainClone backend (FastAPI + Neo4j, lean deploy).
#
# Deploy:
#   1. Push this repo to GitHub.
#   2. Render Dashboard -> New -> Blueprint -> pick this repo (uses this file).
#   3. Fill in the NEO4J_* env vars (marked sync:false) in the dashboard.
#
# Uses the native Python runtime (not backend/Dockerfile, which relies on a
# git-ignored uv.lock). rootDir scopes the service to /backend. r2r/Postgres are
# intentionally omitted — the app runs Neo4j-only.
services:
  - type: web
    name: brainclone-backend
    runtime: python
    rootDir: backend
    plan: free
    region: oregon
    branch: main
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.13.1"
      - key: ENVIRONMENT
        value: production
      - key: LOG_FORMAT
        value: json
      # CORS for the Vercel frontend (JSON list; pydantic parses it).
      - key: CORS_ORIGINS
        value: '["https://brainclone.work","http://localhost:3000"]'
      # Neo4j connection — set these in the Render dashboard (kept out of git).
      - key: NEO4J_URI
        sync: false
      - key: NEO4J_USER
        sync: false
      - key: NEO4J_PASSWORD
        sync: false
      - key: NEO4J_DATABASE
        sync: false
