version: '3.8'

services:
  # PostgreSQL with pgvector
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: graphaura
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # R2R document-RAG service (v3.6.6, Gemini-only via LiteLLM).
  # NOTE: in production the Postgres below is Supabase — point R2R_POSTGRES_*
  # at the Supabase pooler (port 6543/5432) and enable the `vector` extension.
  r2r:
    image: sciphiai/r2r:latest
    ports:
      - "7272:8000"   # container listens on 8000; expose as 7272 on the host
    environment:
      R2R_PROJECT_NAME: brainclone
      R2R_CONFIG_PATH: /app/config/config.toml
      R2R_POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      R2R_POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      R2R_POSTGRES_USER: ${POSTGRES_USER}
      R2R_POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      R2R_POSTGRES_DBNAME: ${R2R_POSTGRES_DBNAME:-r2r}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    volumes:
      - ./r2r-config:/app/config:ro
      - r2r_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/graphaura
      NEO4J_URI: ${NEO4J_URI}
      NEO4J_USER: ${NEO4J_USER}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      R2R_BASE_URL: http://r2r:8000
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS}
    depends_on:
      - postgres
      - r2r

  # Nginx reverse proxy
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend

volumes:
  postgres_data:
  r2r_data: